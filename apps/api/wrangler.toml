name = "xuebaos-api"
main = "src/index.ts"
compatibility_date = "2025-05-12"
compatibility_flags = ["nodejs_compat"]

# ── Secrets (set via wrangler secret put) ─────────────────
# CLERK_SECRET_KEY, CLERK_WEBHOOK_SECRET
# STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET
# DEEPSEEK_API_KEY, REPLICATE_API_TOKEN, OPENAI_API_KEY
# ELEVENLABS_API_KEY, RESEND_API_KEY

[env.production]
route = "api.xuebaos.com/*"

[[env.production.d1_databases]]
binding = "DB"
database_name = "xuebaos-db"
database_id = "833d098b-f5c8-4744-974f-d723ce73f228"

[[env.production.r2_buckets]]
binding = "ASSETS"
bucket_name = "xuebaos-assets"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "xuebaos-storage"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "xuebaos-images"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "105dde0b82f84d1e83fb469026a2fc71"

[[env.production.queues.producers]]
queue = "xuebaos-ai-jobs"
binding = "AI_QUEUE"

[[env.production.queues.consumers]]
queue = "xuebaos-ai-jobs"
max_batch_size = 10
max_batch_timeout = 5

[env.production.vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://xuebaos.com"

[env.production.ai]
binding = "AI"
